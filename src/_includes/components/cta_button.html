
<style>
    /* Default: hide desktop, show mobile */
.desktopShow {
  display: none;
}

.mobileHide {
  display: block;
}

/* At 1024px and above: show desktop, hide mobile */
@media (min-width: 1024px) {
  .desktopShow {
    display: inline-flex; margin: 0; text-align: left; width: 100%; max-width: 900px; justify-content: flex-start; gap: 1rem; align-items: center; flex-wrap: wrap;
  }

  .mobileHide {
    display: none;
  }
}

.cs-btn-request:hover {
  color: #000 !important;
}

</style>
<DIV class="mobileHide"><a class="cs-button-solid" href="tel:{{client.phoneForTel}}">Get a Free Quote in Seconds</a></DIV>

<DIV class="desktopShow">
  <a class="cs-button-solid" href="tel:{{client.phoneForTel}}">Call: {{client.phoneFormatted}}</a>
  <a class="cs-button-solid cs-btn-request" style="background-color:#333; color:#fff;" href="/contact">Request Online</a>
</DIV>
