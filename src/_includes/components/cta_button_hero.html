
<style>
    /* Default: hide desktop, show mobile */
.desktopShow {
  display: none;
}

.mobileHide {
  display: block;
}

/* At 1024px and above: show desktop, hide mobile */
@media (min-width: 1024px) {
  .desktopShow {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .mobileHide {
    display: none;
  }
}

</style>
<DIV class="mobileHide">  <a style="margin-top: 30px;" href="tel:{{client.phoneForTel}}" class="cs-button-solid">Call: {{client.phoneFormatted}}</a></DIV>

<DIV class="desktopShow">
  <a style="margin-top: 30px;" href="tel:{{client.phoneForTel}}" class="cs-button-solid">Call: {{client.phoneFormatted}}</a>
  <a style="margin-top: 30px; background-color: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.6);" href="/contact" class="cs-button-solid">Get a Free Quote</a>
</DIV>
